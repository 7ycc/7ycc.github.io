<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统解密 - 严秀琼</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 全屏覆盖层 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a1a0a 0%, #000 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
        }

        /* 扫描线效果 */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 255, 0, 0.03) 50%,
                transparent 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* 屏幕闪烁 */
        .flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 0, 0.02);
            opacity: 0;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.03; }
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 50, 0, 0.3);
            border-bottom: 1px solid #0f0;
            font-size: 12px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 主终端区域 */
        .terminal-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .terminal-container::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-container::-webkit-scrollbar-track {
            background: #001100;
        }

        .terminal-container::-webkit-scrollbar-thumb {
            background: #0f0;
        }

        /* 终端输出 */
        #terminal-output {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
        }

        .line {
            margin-bottom: 4px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .line.system { color: #0f0; }
        .line.warning { color: #ff0; }
        .line.error { color: #f00; }
        .line.info { color: #0ff; }
        .line.success { color: #0f0; text-shadow: 0 0 10px #0f0; }

        /* 输入区域 */
        .input-area {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0, 30, 0, 0.5);
            border-top: 1px solid #0f0;
        }

        .prompt {
            color: #0f0;
            margin-right: 10px;
            white-space: nowrap;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #0f0;
            font-family: inherit;
            font-size: 14px;
            caret-color: #0f0;
        }

        #user-input::placeholder {
            color: #050;
        }

        /* 进度条 */
        .progress-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid #0f0;
            padding: 20px;
            display: none;
            z-index: 10000;
        }

        .progress-text {
            text-align: center;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #001100;
            border: 1px solid #0f0;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0f0, #0a0);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px #0f0;
        }

        /* 关卡指示器 */
        .level-indicator {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .level-dot {
            width: 12px;
            height: 12px;
            border: 1px solid #0f0;
            background: transparent;
            transition: all 0.3s;
        }

        .level-dot.active {
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
        }

        .level-dot.locked {
            border-color: #050;
            background: #001100;
        }

        /* 二进制背景 */
        .binary-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            font-size: 10px;
            line-height: 10px;
            word-break: break-all;
            z-index: -1;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .status-bar {
                font-size: 10px;
                padding: 8px 10px;
            }
            
            #terminal-output {
                font-size: 12px;
            }
            
            .level-indicator {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 全屏覆盖层 -->
    <div id="overlay">
        <!-- 扫描线 -->
        <div class="scanlines"></div>
        <div class="flicker"></div>
        
        <!-- 二进制背景 -->
        <div class="binary-bg" id="binary-bg"></div>

        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <span class="blink">●</span>
                <span>SYSTEM_OVERRIDE_ACTIVE</span>
            </div>
            <div class="status-item">
                <span>SECURITY_LEVEL:</span>
                <span id="security-level">MAXIMUM</span>
            </div>
            <div class="status-item">
                <span>ATTEMPTS:</span>
                <span id="attempts">3</span>
            </div>
            <div class="status-item">
                <span id="clock">00:00:00</span>
            </div>
        </div>

        <!-- 主终端区域 -->
        <div class="terminal-container" id="terminal-container">
            <div id="terminal-output"></div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <span class="prompt" id="prompt">root@system:~$</span>
            <input type="text" id="user-input" placeholder="等待指令..." autocomplete="off" spellcheck="false">
        </div>
    </div>

    <!-- 进度条弹窗 -->
    <div class="progress-container" id="progress-container">
        <div class="progress-text" id="progress-text">DECRYPTING...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- 关卡指示器 -->
    <div class="level-indicator" id="level-indicator">
        <div class="level-dot active" data-level="1"></div>
        <div class="level-dot locked" data-level="2"></div>
        <div class="level-dot locked" data-level="3"></div>
        <div class="level-dot locked" data-level="4"></div>
        <div class="level-dot locked" data-level="5"></div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const LEVELS = [
            {
                id: 1,
                name: "初始访问",
                password: "guest",
                hint: "默认访客账户",
                desc: "系统检测到未授权访问。请输入访客密码以继续..."
            },
            {
                id: 2,
                name: "防火墙突破",
                password: "firewall2024",
                hint: "当前年份 + 安全设备",
                desc: "防火墙已激活。需要特定密钥才能通过安全检测..."
            },
            {
                id: 3,
                name: "加密协议",
                password: "aes256",
                hint: "高级加密标准 + 密钥长度",
                desc: "数据已加密。请输入加密协议标识符..."
            },
            {
                id: 4,
                name: "核心系统",
                password: "kernel_x86",
                hint: "系统核心 + 架构",
                desc: "警告：核心系统访问受限。需要管理员凭证..."
            },
            {
                id: 5,
                name: "根权限",
                password: "sudo_rm_rf",
                hint: "超级用户命令 + 危险操作",
                desc: "最终防线。输入根访问代码以获取完全控制权..."
            }
        ];

        // ==================== 游戏状态 ====================
        let currentLevel = 0;
        let attempts = 3;
        let gameState = 'intro';
        let commandHistory = [];
        let historyIndex = -1;

        // ==================== DOM 元素 ====================
        const terminalOutput = document.getElementById('terminal-output');
        const userInput = document.getElementById('user-input');
        const prompt = document.getElementById('prompt');
        const attemptsDisplay = document.getElementById('attempts');
        const securityLevel = document.getElementById('security-level');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const terminalContainer = document.getElementById('terminal-container');
        const binaryBg = document.getElementById('binary-bg');

        // ==================== 工具函数 ====================
        function generateBinaryBackground() {
            let binary = '';
            for (let i = 0; i < 2000; i++) {
                binary += Math.random() > 0.5 ? '1' : '0';
                if (i % 80 === 0) binary += ' ';
            }
            binaryBg.textContent = binary;
        }

        function updateClock() {
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            document.getElementById('clock').textContent = time;
        }

        function typeWriter(text, color = 'system', speed = 30) {
            return new Promise(resolve => {
                const line = document.createElement('div');
                line.className = `line ${color}`;
                terminalOutput.appendChild(line);
                
                let i = 0;
                function type() {
                    if (i < text.length) {
                        line.textContent += text.charAt(i);
                        i++;
                        scrollToBottom();
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        function printLine(text, color = 'system') {
            const line = document.createElement('div');
            line.className = `line ${color}`;
            line.textContent = text;
            line.style.opacity = '1';
            terminalOutput.appendChild(line);
            scrollToBottom();
        }

        function scrollToBottom() {
            terminalContainer.scrollTop = terminalContainer.scrollHeight;
        }

        function clearTerminal() {
            terminalOutput.innerHTML = '';
        }

        function updateLevelIndicator() {
            const dots = document.querySelectorAll('.level-dot');
            dots.forEach((dot, index) => {
                dot.className = 'level-dot';
                if (index < currentLevel) {
                    dot.classList.add('active');
                } else if (index === currentLevel) {
                    dot.classList.add('active');
                } else {
                    dot.classList.add('locked');
                }
            });
        }

        function updateSecurityLevel() {
            const levels = ['MAXIMUM', 'HIGH', 'ELEVATED', 'MODERATE', 'LOW', 'BYPASSED'];
            securityLevel.textContent = levels[currentLevel] || 'UNKNOWN';
        }

        // ==================== 游戏流程 ====================
        async function showIntro() {
            clearTerminal();
            
            await typeWriter('>>> 初始化安全协议...', 'system', 20);
            await delay(500);
            await typeWriter('>>> 检测到未授权访问尝试', 'warning', 20);
            await delay(300);
            await typeWriter('>>> 启动防御系统...', 'system', 20);
            await delay(500);
            
            printLine('');
            printLine('╔════════════════════════════════════════════════╗', 'error');
            printLine('║     ⚠  警告：系统安全已受到威胁  ⚠            ║', 'error');
            printLine('╚════════════════════════════════════════════════╝', 'error');
            printLine('');
            
            await typeWriter('你需要通过5层安全验证才能访问核心数据。', 'info');
            await typeWriter('每层都有密码保护。输入 "hint" 获取提示。', 'info');
            await typeWriter('输入 "help" 查看可用命令。', 'info');
            printLine('');
            
            startLevel();
        }

        function startLevel() {
            const level = LEVELS[currentLevel];
            gameState = 'playing';
            
            printLine(`[LEVEL ${level.id}/5] ${level.name}`, 'warning');
            printLine('=' .repeat(50), 'system');
            printLine(level.desc, 'info');
            printLine('');
            
            updateLevelIndicator();
            updateSecurityLevel();
            
            userInput.focus();
        }

        async function checkPassword(input) {
            const level = LEVELS[currentLevel];
            
            if (input === level.password) {
                gameState = 'decrypting';
                await showDecryptionAnimation();
                
                printLine('');
                printLine(`[✓] 访问 granted - ${level.name}`, 'success');
                printLine('');
                
                currentLevel++;
                attempts = 3;
                attemptsDisplay.textContent = attempts;
                
                if (currentLevel >= LEVELS.length) {
                    await showVictory();
                } else {
                    await delay(1000);
                    startLevel();
                }
            } else {
                attempts--;
                attemptsDisplay.textContent = attempts;
                
                printLine('');
                printLine(`[✗] 访问 denied - 密码错误`, 'error');
                
                if (attempts <= 0) {
                    await showGameOver();
                } else {
                    printLine(`剩余尝试次数: ${attempts}`, 'warning');
                    printLine('');
                }
            }
        }

        async function showDecryptionAnimation() {
            progressContainer.style.display = 'block';
            
            const steps = [
                { text: 'VERIFYING CREDENTIALS...', progress: 20 },
                { text: 'BYPASSING SECURITY...', progress: 40 },
                { text: 'DECRYPTING DATA...', progress: 60 },
                { text: 'ACCESSING MAINFRAME...', progress: 80 },
                { text: 'ACCESS GRANTED', progress: 100 }
            ];
            
            for (const step of steps) {
                progressText.textContent = step.text;
                progressFill.style.width = step.progress + '%';
                await delay(400);
            }
            
            await delay(500);
            progressContainer.style.display = 'none';
            progressFill.style.width = '0%';
        }

        async function showVictory() {
            gameState = 'success';
            clearTerminal();
            
            printLine('');
            printLine('╔════════════════════════════════════════════════╗', 'success');
            printLine('║                                                ║', 'success');
            printLine('║           🎉  系统完全破解成功  🎉             ║', 'success');
            printLine('║                                                ║', 'success');
            printLine('╚════════════════════════════════════════════════╝', 'success');
            printLine('');
            
            await typeWriter('恭喜你！所有安全层已被突破。', 'success');
            await typeWriter('核心数据访问权限已授予。', 'success');
            printLine('');
            printLine('可用命令:', 'info');
            printLine('  reboot - 重新开始游戏', 'system');
            printLine('  exit   - 退出系统', 'system');
        }

        async function showGameOver() {
            gameState = 'failed';
            clearTerminal();
            
            printLine('');
            printLine('╔════════════════════════════════════════════════╗', 'error');
            printLine('║                                                ║', 'error');
            printLine('║           ⚠  访问被拒绝  ⚠                     ║', 'error');
            printLine('║                                                ║', 'error');
            printLine('╚════════════════════════════════════════════════╝', 'error');
            printLine('');
            
            await typeWriter('尝试次数已耗尽。', 'error');
            await typeWriter('系统已锁定你的IP地址。', 'error');
            await typeWriter('正在追踪位置...', 'warning');
            printLine('');
            printLine('可用命令:', 'info');
            printLine('  reboot - 重新开始游戏', 'system');
            printLine('  exit   - 退出系统', 'system');
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ==================== 命令处理 ====================
        async function processCommand(input) {
            const cmd = input.toLowerCase().trim();
            
            if (gameState === 'playing') {
                await checkPassword(input);
                return;
            }
            
            switch (cmd) {
                case 'help':
                    printLine('');
                    printLine('可用命令:', 'info');
                    printLine('  help   - 显示此帮助信息', 'system');
                    printLine('  hint   - 获取当前关卡提示', 'system');
                    printLine('  clear  - 清空终端', 'system');
                    printLine('  status - 显示当前状态', 'system');
                    printLine('  reboot - 重新开始游戏', 'system');
                    printLine('  exit   - 退出系统', 'system');
                    printLine('');
                    break;
                    
                case 'hint':
                    if (currentLevel < LEVELS.length) {
                        const level = LEVELS[currentLevel];
                        printLine('');
                        printLine(`[提示] ${level.hint}`, 'warning');
                        printLine('');
                    }
                    break;
                    
                case 'clear':
                    clearTerminal();
                    break;
                    
                case 'status':
                    printLine('');
                    printLine('当前状态:', 'info');
                    printLine(`  关卡: ${currentLevel + 1}/5`, 'system');
                    printLine(`  剩余尝试: ${attempts}`, 'system');
                    printLine(`  安全等级: ${securityLevel.textContent}`, 'system');
                    printLine('');
                    break;
                    
                case 'reboot':
                    printLine('');
                    printLine('>>> 系统重启中...', 'warning');
                    await delay(1000);
                    currentLevel = 0;
                    attempts = 3;
                    attemptsDisplay.textContent = attempts;
                    await showIntro();
                    break;
                    
                case 'exit':
                    printLine('');
                    printLine('>>> 断开连接...', 'system');
                    await delay(500);
                    window.location.href = 'index.html';
                    break;
                    
                default:
                    if (gameState === 'success' || gameState === 'failed') {
                        printLine(`未知命令: ${cmd}`, 'error');
                        printLine('输入 "help" 查看可用命令', 'info');
                    }
            }
        }

        // ==================== 事件监听 ====================
        userInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const input = userInput.value.trim();
                if (!input) return;
                
                printLine(`${prompt.textContent} ${input}`, 'system');
                
                commandHistory.push(input);
                historyIndex = commandHistory.length;
                
                await processCommand(input);
                
                userInput.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    userInput.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    userInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    userInput.value = '';
                }
            }
        });

        document.addEventListener('click', () => {
            userInput.focus();
        });

        // 初始化
        generateBinaryBackground();
        setInterval(updateClock, 1000);
        updateClock();
        
        setTimeout(showIntro, 500);
    </script>
</body>
</html>
